# Edit this file to add or remove workspace menus and commands.
#
# A command should normally use argv, which avoids shell quoting problems:
# argv = ["code", "/some/path"]
#
# Use shell only when you really need shell features:
# shell = "docker compose up -d"
#
# detach = true opens GUI apps and immediately returns to the menu script.

title = "Workspace Menu"

[defaults]
detach = true
sleep_seconds = 0.1
prompt = "Open which windows?"

[checks.sensomatic_drive]
type = "systemd_user_mount"
service = "rclone_drive_sensomatic_drive.service"
dir = "/home/iotlaptop/Documents/sensomatic_drive"
timeout_seconds = 60
poll_seconds = 2

[projects.alqueria_tanqueros]
label = "Alqueria Tanqueros"
aliases = ["alqueria", "tanqueros", "milk", "trucks"]
